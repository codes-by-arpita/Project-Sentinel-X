<svg width="1200" height="675" viewBox="0 0 1200 675" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="675" gradientUnits="userSpaceOnUse">
      <stop stop-color="#04070D"/>
      <stop offset="1" stop-color="#09131C"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0D1724"/>
      <stop offset="1" stop-color="#0A1019"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#00F0FF"/>
      <stop offset="1" stop-color="#39FF14"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .title { font: 800 46px 'Segoe UI', Arial, sans-serif; letter-spacing: 1px; }
      .subtitle { font: 500 20px 'Segoe UI', Arial, sans-serif; fill: #9FB3C8; }
      .label { font: 700 22px 'Segoe UI', Arial, sans-serif; fill: #E6F2FF; }
      .body { font: 500 17px 'Segoe UI', Arial, sans-serif; fill: #AFC4D6; }
      .mono { font: 600 16px Consolas, monospace; fill: #00F0FF; }
      .small { font: 600 14px Consolas, monospace; fill: #39FF14; }
    </style>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>

  <g opacity="0.16">
    <path d="M0 96H1200M0 192H1200M0 288H1200M0 384H1200M0 480H1200M0 576H1200" stroke="#39FF14"/>
    <path d="M120 0V675M240 0V675M360 0V675M480 0V675M600 0V675M720 0V675M840 0V675M960 0V675M1080 0V675" stroke="#00F0FF"/>
  </g>

  <text x="70" y="88" class="title" fill="#F7FBFF">Sentinel-X</text>
  <text x="70" y="122" class="subtitle">Autonomous environmental crisis detection and policy response platform</text>

  <rect x="70" y="170" rx="26" ry="26" width="275" height="350" fill="url(#panel)" stroke="#20364B"/>
  <text x="100" y="220" class="mono">[ FRONTEND ]</text>
  <text x="100" y="268" class="label">Web Command Center</text>
  <text x="100" y="310" class="body">HTML, CSS, JavaScript, Tailwind CDN</text>
  <text x="100" y="342" class="body">Scenario input, orchestration log, policy panel</text>
  <text x="100" y="374" class="body">Cyber-operations UI for real-time monitoring</text>
  <rect x="100" y="412" rx="14" ry="14" width="215" height="58" fill="#07111A" stroke="#00F0FF"/>
  <text x="128" y="448" class="small">&gt; Execute Agents</text>

  <rect x="462" y="130" rx="28" ry="28" width="275" height="430" fill="url(#panel)" stroke="#2B4D63"/>
  <text x="492" y="180" class="mono">[ ORCHESTRATION ]</text>
  <text x="492" y="230" class="label">n8n Multi-Agent Workflow</text>
  <text x="492" y="276" class="body">Webhook trigger coordinates the full pipeline</text>
  <text x="492" y="308" class="body">Tool-augmented research feeds structured policy output</text>
  <text x="492" y="340" class="body">Designed for autonomous but auditable action</text>

  <rect x="492" y="384" rx="18" ry="18" width="215" height="58" fill="#07111A" stroke="#39FF14"/>
  <text x="524" y="420" class="small">Field Researcher Agent</text>
  <rect x="492" y="464" rx="18" ry="18" width="215" height="58" fill="#07111A" stroke="#FF7A59"/>
  <text x="528" y="500" class="small" fill="#FF7A59">Policy Director Agent</text>

  <rect x="855" y="170" rx="26" ry="26" width="275" height="350" fill="url(#panel)" stroke="#20364B"/>
  <text x="885" y="220" class="mono">[ OUTPUT ]</text>
  <text x="885" y="268" class="label">Policy Response Layer</text>
  <text x="885" y="310" class="body">Threat level, SDG alignment, risk summary</text>
  <text x="885" y="342" class="body">Immediate action and formal policy brief</text>
  <text x="885" y="374" class="body">Returned as strict JSON for downstream use</text>
  <rect x="885" y="412" rx="14" ry="14" width="215" height="58" fill="#07111A" stroke="#39FF14"/>
  <text x="942" y="448" class="small">SDG 13 / SDG 15</text>

  <path d="M345 345C385 345 408 345 450 345" stroke="url(#accent)" stroke-width="6" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M737 345C780 345 810 345 850 345" stroke="url(#accent)" stroke-width="6" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M436 334L460 345L436 356" fill="#00F0FF"/>
  <path d="M826 334L850 345L826 356" fill="#39FF14"/>

  <text x="70" y="612" class="subtitle">Built with n8n + Node.js proxy + browser UI for resilient environmental crisis operations</text>
</svg>
